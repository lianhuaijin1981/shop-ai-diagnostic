# 应用配置
app:
  host: 0.0.0.0
  port: 8080
  env: development

# 数据库配置
database:
  host: localhost
  port: 27017
  name: shop_ai_diagnostic
  username: ""
  password: ""
  authSource: admin

# Redis配置
redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

# JWT配置
jwt:
  secret: your-jwt-secret-key-change-in-production
  expiresIn: 7d

# AI配置
ai:
  provider: openai
  apiKey: ${OPENAI_API_KEY}
  model: gpt-4
  temperature: 0.7
  maxTokens: 2000

# 诊断权重配置
diagnostic:
  weights:
    customerFlow: 0.20    # 客流权重 20%
    conversion: 0.25       # 转化权重 25%
    avgAmount: 0.20        # 客单价权重 20%
    repurchase: 0.20       # 复购权重 20%
    profit: 0.15           # 利润权重 15%
  benchmarks:
    customerFlow: 100      # 客流基准值
    conversion: 40         # 转化率基准值 (%)
    avgAmount: 180         # 客单价基准值 (元)
    repurchase: 50         # 复购率基准值 (%)
    profit: 30             # 利润率基准值 (%)

# 预警规则配置
alert:
  rules:
    customerFlow:
      danger: 70           # 客流低于70触发危险预警
      warning: 85          # 客流低于85触发警告预警
    conversion:
      danger: 30
      warning: 35
    avgAmount:
      danger: 150
      warning: 160
    repurchase:
      danger: 35
      warning: 40
    profit:
      danger: 20
      warning: 25
